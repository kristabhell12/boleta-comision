<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boleta de Comisión</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header img {
    height: 70px;
}

.center {
    text-align: center;
}

.title {
    background: #0c2d5a;
    color: white;
    padding: 8px;
    margin-top: 20px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 12px;
}

.row {
    display: flex;
    gap: 10px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #0c2d5a;
    color: white;
    border: none;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/logo%20umsa.png">
    
    <div class="center">
        <strong>UNIVERSIDAD MAYOR DE SAN ANDRÉS</strong><br>
        CARRERA DE CIENCIAS QUÍMICAS
    </div>

    <img src="https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/log-cs.quimicas.png">
</div>

<div class="title center">
BOLETA DE COMISIÓN POR VIAJE
</div>

<!-- FORMULARIO -->
<label>NOMBRES Y APELLIDOS</label>
<input id="nombre">

<div class="row">
<div style="flex:1">
<label>N° DE ITEM</label>
<input id="item">
</div>

<div style="flex:1">
<label>DÍAS</label>
<input id="dias">
</div>
</div>

<label>FECHAS</label>
<div class="row">
<input type="date" id="fecha1">
<input type="date" id="fecha2">
</div>

<label>HORAS</label>
<div class="row">
<input type="time" id="hora1">
<input type="time" id="hora2">
</div>

<label>MOTIVO</label>
<textarea id="motivo"></textarea>

<label>FECHA (LA PAZ)</label>
<input type="date" id="fechaFinal">

<button onclick="generarPDF()">Descargar PDF</button>

<script>
async function generarPDF() {
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "letter"
    });

    let y = 25;

    const logo1 = await cargarImagen("https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/logo%20umsa.png");
    const logo2 = await cargarImagen("https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/log-cs.quimicas.png");

    // Logos (más separados)
    doc.addImage(logo1, "PNG", 15, 10, 22, 22);
    doc.addImage(logo2, "PNG", 173, 10, 22, 22);

    // Encabezado
    doc.setFontSize(12);
    doc.text("UNIVERSIDAD MAYOR DE SAN ANDRÉS", 105, 20, null, null, "center");
    doc.text("CARRERA DE CIENCIAS QUÍMICAS", 105, 26, null, null, "center");

    // 🔵 FRANJA AZUL MÁS ABAJO
    doc.setFillColor(12, 45, 90);
    doc.rect(20, 38, 170, 8, "F");

    doc.setTextColor(255,255,255);
    doc.text("BOLETA DE COMISIÓN POR VIAJE", 105, 43, null, null, "center");

    doc.setTextColor(0,0,0);

    y = 55;

    // Datos
    doc.setFontSize(10);

    doc.text("NOMBRES Y APELLIDOS:", 20, y);
    doc.line(70, y, 190, y);
    doc.text(val("nombre"), 72, y-1);

    y += 10;
    doc.text("N° ITEM:", 20, y);
    doc.line(45, y, 90, y);
    doc.text(val("item"), 47, y-1);

    doc.text("DÍAS:", 110, y);
    doc.line(130, y, 190, y);
    doc.text(val("dias"), 132, y-1);

    y += 10;
    doc.text("FECHAS:", 20, y);

    y += 6;
    doc.text("DE:", 20, y);
    doc.line(35, y, 90, y);
    doc.text(val("fecha1"), 37, y-1);

    doc.text("A:", 110, y);
    doc.line(120, y, 190, y);
    doc.text(val("fecha2"), 122, y-1);

    y += 10;
    doc.text("HORAS:", 20, y);

    y += 6;
    doc.text("DE:", 20, y);
    doc.line(35, y, 90, y);
    doc.text(val("hora1"), 37, y-1);

    doc.text("A:", 110, y);
    doc.line(120, y, 190, y);
    doc.text(val("hora2"), 122, y-1);

    y += 12;
    doc.text("MOTIVO:", 20, y);

    y += 5;
    doc.rect(20, y, 170, 30);
    doc.text(val("motivo"), 22, y+5);

    y += 40;
    doc.text("LA PAZ " + val("fechaFinal"), 60, y);

    // Firmas
    y += 30;

    doc.line(30, y, 90, y);
    doc.setFontSize(9);
    doc.text("DOCENTE RESPONSABLE", 60, y + 5, null, null, "center");

    doc.line(120, y, 180, y);
    doc.text("Ph.D. Heriberto Castañeta Maroni", 150, y + 5, null, null, "center");
    doc.text("Director", 150, y + 10, null, null, "center");
    doc.text("Carrera de Ciencias Químicas", 150, y + 15, null, null, "center");

    // VoBo
    y += 25;
    doc.text("Vo. Bo.", 30, y);
    doc.line(45, y, 90, y);

    // Sello
    doc.setTextColor(150,150,150);
    doc.setFontSize(28);
    doc.text("VALIDADO", 105, 200, null, null, "center", 45);

    doc.save("boleta_comision.pdf");
}

function val(id){
    return document.getElementById(id).value;
}

function cargarImagen(url) {
    return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
        };
        img.src = url;
    });
}
</script>

</body>
</html>
