<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boleta de Comisión</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header img {
    height: 70px;
}

.center {
    text-align: center;
}

.title {
    background: #0c2d5a;
    color: white;
    padding: 8px;
    margin-top: 20px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 12px;
}

.row {
    display: flex;
    gap: 10px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #0c2d5a;
    color: white;
    border: none;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/logo%20umsa.png">
    
    <div class="center">
        <strong>UNIVERSIDAD MAYOR DE SAN ANDRÉS</strong><br>
        CARRERA DE CIENCIAS QUÍMICAS
    </div>

    <img src="https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/log-cs.quimicas.png">
</div>

<div class="title center">
BOLETA DE COMISIÓN POR VIAJE
</div>

<label>NOMBRES Y APELLIDOS</label>
<input id="nombre">

<div class="row">
<div style="flex:1">
<label>N° DE ITEM</label>
<input id="item">
</div>

<div style="flex:1">
<label>DÍAS</label>
<input id="dias">
</div>
</div>

<label>FECHAS</label>
<div class="row">
<input type="date" id="fecha1">
<input type="date" id="fecha2">
</div>

<label>HORAS</label>
<div class="row">
<input type="time" id="hora1">
<input type="time" id="hora2">
</div>

<label>MOTIVO</label>
<textarea id="motivo"></textarea>

<label>FECHA (LA PAZ)</label>
<input type="date" id="fechaFinal">

<button onclick="generarPDF()">Descargar PDF</button>

<script>
async function generarPDF() {
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "letter"
    });

    const margin = 20;
    let y = margin + 10;

    const logo1 = await cargarImagen("https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/logo%20umsa.png");
    const logo2 = await cargarImagen("https://raw.githubusercontent.com/kristabhell12/boleta-comision/refs/heads/main/log-cs.quimicas.png");

    // Logos
    doc.addImage(logo1, "PNG", margin, 10, 18, 30);
    doc.addImage(logo2, "PNG", 210 - margin - 22, 10, 22, 22);

    // Encabezado
    doc.setFontSize(12);
    doc.text("UNIVERSIDAD MAYOR DE SAN ANDRÉS", 105, 22, null, null, "center");
    doc.text("CARRERA DE CIENCIAS QUÍMICAS", 105, 28, null, null, "center");

    // Franja azul
    doc.setFillColor(12, 45, 90);
    doc.rect(margin, 40, 210 - margin * 2, 8, "F");

    doc.setTextColor(255,255,255);
    doc.text("BOLETA DE COMISIÓN POR VIAJE", 105, 45, null, null, "center");
    doc.setTextColor(0,0,0);

    y = 60;

    doc.setFontSize(10);

    doc.text("NOMBRES Y APELLIDOS:", margin, y);
    doc.line(margin + 50, y, 210 - margin, y);
    doc.text(val("nombre"), margin + 52, y-1);

    y += 10;
    doc.text("N° ITEM:", margin, y);
    doc.line(margin + 25, y, margin + 70, y);
    doc.text(val("item"), margin + 27, y-1);

    doc.text("DÍAS:", margin + 90, y);
    doc.line(margin + 110, y, 210 - margin, y);
    doc.text(val("dias"), margin + 112, y-1);

    y += 10;
    doc.text("FECHAS:", margin, y);

    y += 6;
    doc.text("DE:", margin, y);
    doc.line(margin + 15, y, margin + 70, y);
    doc.text(val("fecha1"), margin + 17, y-1);

    doc.text("A:", margin + 90, y);
    doc.line(margin + 100, y, 210 - margin, y);
    doc.text(val("fecha2"), margin + 102, y-1);

    y += 10;
    doc.text("HORAS:", margin, y);

    y += 6;
    doc.text("DE:", margin, y);
    doc.line(margin + 15, y, margin + 70, y);
    doc.text(val("hora1"), margin + 17, y-1);

    doc.text("A:", margin + 90, y);
    doc.line(margin + 100, y, 210 - margin, y);
    doc.text(val("hora2"), margin + 102, y-1);

    y += 12;
    doc.text("MOTIVO:", margin, y);

    y += 5;
    doc.rect(margin, y, 210 - margin * 2, 30);
    doc.text(val("motivo"), margin + 2, y+5);

    y += 40;
    doc.text("LA PAZ " + val("fechaFinal"), 70, y);

    // Firmas
    y += 30;

    doc.line(margin + 10, y, margin + 70, y);
    doc.setFontSize(9);
    doc.text("DOCENTE RESPONSABLE", margin + 40, y + 5, null, null, "center");

    doc.line(210 - margin - 70, y, 210 - margin - 10, y);
    doc.text("Ph.D. Heriberto Castañeta Maroni", 210 - margin - 40, y + 5, null, null, "center");
    doc.text("Director", 210 - margin - 40, y + 10, null, null, "center");
    doc.text("Carrera de Ciencias Químicas", 210 - margin - 40, y + 15, null, null, "center");

    // VoBo
    y += 25;
    doc.text("Vo. Bo.", margin + 10, y);
    doc.line(margin + 25, y, margin + 70, y);

    // Sello
    doc.setTextColor(150,150,150);
    doc.setFontSize(28);
    doc.text("VALIDADO", 105, 200, null, null, "center", 45);

    doc.save("boleta_comision.pdf");
}

function val(id){
    return document.getElementById(id).value;
}

function cargarImagen(url) {
    return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL("image/png"));
        };
        img.src = url;
    });
}
</script>

</body>
</html>
